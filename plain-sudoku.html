				<div class="button"><p>Resume</p><div class="secondary-content"><p class="difficulty">Difficulty</p><p>•</p><p class="resume-time">0:00</p></div></div>
				<div class="button"><p>Settings</p></div>

		</div>

			<div class="shine"></div>

		<style>
			:root {
				--base-size: 1.5;
			}
			
			@media (min-width: 650px) {
				:root {
					--base-size: 1.75;
				}
			}
			
			@media (min-width: 900px) {
				:root {
					--base-size: 2;
				}
			}
		
			html {
				height: 100%;
				width: 100%;
				box-sizing: border-box;
			}

			#filterSource {
				display: none;
			}
			
			body {
				margin: 0;
				background-color: #172B32;
				height: 100%;
				width: 100%;
				overflow: hidden;
			}
			
			[class^="view-"][nav="true"] {
				top: 52px;
			}
			
			[class^="view-"] {
				position: absolute;
				top: 0;
				width: 100%;
				height: 100%;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 24px;
				z-index: 12;
				box-sizing: border-box;
			}
			
			.buttons-container {
				width: 100%;
				display: flex;
				flex-direction: column;
				gap: 24px;
				filter: drop-shadow(0px calc(var(--base-size)*16px) 0px rgba(1, 24, 37, 0.42));
				align-items: center;
				justify-content: center;
			}
			
			.button {
				background-color: #9FBC35;
				padding: 0.6em;
				border-radius: 8px;
				width: 100%;
				max-width: 300px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				box-sizing: border-box;
			}
			
			.button p {
				font-family: 'Nunito sans', Arial, sans-serif;
				font-weight: 700;
				margin: 0;
				font-size: 1.2em;
			}
			
			.button .secondary-content {
				display: flex;
				flex-direction: row;
				gap: 4px;
			}
			
			.button .secondary-content p {
				font-size: 0.9em;
			}
			
			h1.game-title {
				font-family: 'Jersey 10';
				color: #fff;
				text-shadow: 2px 4px #172B32;
				font-size: 3em;
			}
			
			.shine {
				position: absolute;
				top: 0;
				left: 0;
				height: 100%;
				width: 100%;
				z-index: 6;
				background: linear-gradient(65deg, rgba(2, 11, 13, 0.4) 0%, rgba(15, 40, 43, 0.12) 50%, rgba(195, 212, 163, 0.4) 100%);
			}
			.pond {
				height: 100%;
				width: 100%;
				overflow: hidden;
				position: relative;
				background: url('https://susanpallmann.github.io/sudoku-pond/images/caustics.gif');
				background-repeat: repeat;
			}

			.shadow-layers {
				height: 100%;
				width: 100%;
				position: absolute;
				filter: drop-shadow(0px calc(var(--base-size)*16px) 0px rgba(1, 24, 37, 0.42));
				z-index: 2;
			}
			
			.pond:after {
				content: "";
				position: absolute;
				height: 100%;
				width: 100%;
				top: 0;
				left: 0;
				background-color: #00576b;
				z-index: 6;
				opacity: 0.0;
			}
			.lily-layer {
				z-index: 9;
				position: absolute;
				height: 100%;
				width: 100%;
				
			}
			.lily-layer svg:nth-child(2n) {
				transform: scaleX(-1);
			}
			.lily-layer svg:nth-child(3n+1) {
				animation-delay: -600ms;
			}
			.lily-layer svg:nth-child(3n+2) {
				animation-delay: -1200ms;
			}
			.lily-layer svg {
				filter: drop-shadow(0px 8px 0px rgba(0, 87, 107, 0.55));
				animation: lily-float 2s ease-in-out infinite alternate;
			}
			@keyframes lily-float {
				0% {transform: translateX(10%);}
				100% {transform: translateX(-10%);}
			}
			.lily-1 {
				height: calc(var(--base-size)*16px);
				width: calc(var(--base-size)*30px);
			}
			.lily-2 {
				height: calc(var(--base-size)*20px);
				width: calc(var(--base-size)*34px);
			}
			.lily-3 {
				height: calc(var(--base-size)*14px);
				width: calc(var(--base-size)*18px);
			}
			.fish-layer {
				z-index: 5;
				position: absolute;
				height: 100%;
				width: 100%;
				top: 0;
				left: 0;
				/*filter: url(#wavy);*/
			}
			body:after {
				content: "";
				height: 100%;
				width: 100%;
				position: absolute;
				top: 0;
				left: 0;
				opacity: 1;
				z-index: 6;
			}
			
			@keyframes fin-left {
				0%   {transform: rotate(0deg);}
				25%  {transform: rotate(10deg);}
				75%  {transform: rotate(-10deg);}
				100% {transform: rotate(0deg);}
			}
			
			@keyframes fin-right {
				0%   {transform: rotate(0deg);}
				25%  {transform: rotate(-10deg);}
				75%  {transform: rotate(10deg);}
				100% {transform: rotate(0deg);}
			}
			
			@keyframes swim {
				0%   {transform: rotate(0deg);}
				25%  {transform: rotate(-10deg);}
				75%  {transform: rotate(10deg);}
				100% {transform: rotate(0deg);}
			}
			
			@keyframes swim-head {
				0%   {transform: rotate(0deg);}
				25%  {transform: rotate(10deg);}
				75%  {transform: rotate(-10deg);}
				100% {transform: rotate(0deg);}
			}
			
			.fish-wrapper {
				display: flex;
				flex-direction: column;
				align-items: center;
				width: calc(var(--base-size)*40px);
				position: absolute;
				transform-origin: 50% calc(var(--base-size)*4px);
				filter: drop-shadow(0px calc(var(--base-size)*4px) 0px rgba(0, 87, 107, 0.55));
			}
			
			.fish {
				display: flex;
				flex-direction: column;
				align-items: center;
				width: calc(var(--base-size)*40px);
				position: absolute;
				transform-origin: 50% calc(var(--base-size)*4px);
			}
			
			.fish-ripple-1 {
				opacity: 0;
				transition: opacity 0.1s;
				height: calc(var(--base-size)*28px);
				width: calc(var(--base-size)*28px);
				position: absolute;
				top: calc(var(--base-size)*-6px);
				z-index: 7;
			}
			.fish-ripple-2 {
				opacity: 0;
				transition: opacity 0.1s;
				height: calc(var(--base-size)*36px);
				width: calc(var(--base-size)*36px);
				position: absolute;
				top: calc(var(--base-size)*-8px);
				z-index: 7;
			}
			.fish-ripple-3 {
				opacity: 0;
				transition: opacity 0.1s;
				height: calc(var(--base-size)*36px);
				width: calc(var(--base-size)*36px);
				position: absolute;
				top: calc(var(--base-size)*-10px);
				z-index: 7;
			}

			:root {
				--sprite-offset-left: 0px;
				--sprite-offset-top: 0px;

				--background-size-height: calc(727px / 4 * var(--base-size));
			}
			.fish[fish-skin="1"] {
				--sprite-offset-top: calc(0 * (363px / 4 * var(--base-size) + (1px / 4 * var(--base-size))));

			}

					this.element.empty();

					} else {
						this.element.append($(`<div class="notes"></div>`));
						for (let i = 1; i <= 9; i++) {

							let bolded = this.boldNote === i ? 'true' : 'false';

						}

					this.element.attr('highlight', this.highlight);
					this.element.attr('type', this.type);
					this.element.attr('error', this.error);

					for (let i = 0; i < this.puzzle.cells.length; i++) {
						this.puzzle.cells[i].deselect();
						let level = null;
						if (this.puzzle.cells[i].row === this.row || this.puzzle.cells[i].column === this.column || this.puzzle.cells[i].square === this.square) {
							level = 'level-1';

								   placements[(rowRelatedSquare2 + 1)*9 + otherColumn2].includes(value) ||
								   placements[(rowRelatedSquare2 + 2)*9 + otherColumn2].includes(value)) &&
								   (!placements[(rowRelatedSquare2 + 0)*9 + otherColumn1].includes(value) ||
								   !placements[(rowRelatedSquare2 + 1)*9 + otherColumn1].includes(value) ||
								   !placements[(rowRelatedSquare2 + 2)*9 + otherColumn1].includes(value)))))) {
						return true;
					} else if (((((placements[row*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 2].includes(value)) &&
								  (placements[otherRow1*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[otherRow1*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[otherRow1*9 + columnRelatedSquare1 + 2].includes(value)) &&
								 (!placements[otherRow2*9 + columnRelatedSquare1 + 0].includes(value) ||
								  !placements[otherRow2*9 + columnRelatedSquare1 + 1].includes(value) ||
								  !placements[otherRow2*9 + columnRelatedSquare1 + 2].includes(value)))) &&
								(((placements[row*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 2].includes(value)) &&
								  (placements[otherRow1*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[otherRow1*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[otherRow1*9 + columnRelatedSquare1 + 2].includes(value)) &&
								 (!placements[otherRow2*9 + columnRelatedSquare1 + 0].includes(value) ||
								  !placements[otherRow2*9 + columnRelatedSquare1 + 1].includes(value) ||
								  !placements[otherRow2*9 + columnRelatedSquare1 + 2].includes(value))))) ||
								   
							   ((((placements[row*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 2].includes(value)) &&
								  (placements[otherRow2*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[otherRow2*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[otherRow2*9 + columnRelatedSquare1 + 2].includes(value)) &&
								 (!placements[otherRow1*9 + columnRelatedSquare1 + 0].includes(value) ||
								  !placements[otherRow1*9 + columnRelatedSquare1 + 1].includes(value) ||
								  !placements[otherRow1*9 + columnRelatedSquare1 + 2].includes(value)))) &&
								(((placements[row*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[row*9 + columnRelatedSquare1 + 2].includes(value)) &&
								  (placements[otherRow2*9 + columnRelatedSquare1 + 0].includes(value) ||
								   placements[otherRow2*9 + columnRelatedSquare1 + 1].includes(value) ||
								   placements[otherRow2*9 + columnRelatedSquare1 + 2].includes(value)) &&
								 (!placements[otherRow1*9 + columnRelatedSquare1 + 0].includes(value) ||
								  !placements[otherRow1*9 + columnRelatedSquare1 + 1].includes(value) ||
								  !placements[otherRow1*9 + columnRelatedSquare1 + 2].includes(value)))))) {
						return true;
					}
					return false;
				}
				
				countSolutions(grid, cell, value) {
					let row = Math.floor(cell / 9);
					let column = cell % 9;
					let startRow = Math.floor(row / 3) * 3;
					let startColumn = Math.floor(column / 3) * 3;
					
					let rowPlacements = {};
					let columnPlacements = {};
					let squarePlacements = {};
					let gridPlacements = [];
					
					for (let i = 0; i < 81; i++) {
						if (grid[i] === 0) {
							if (Math.floor(i/9) === row) {
								rowPlacements[i] = this.getPlacements(grid, i);
							}
							if (i % 9 === column) {
								columnPlacements[i] = this.getPlacements(grid, i);
							}
							if (Math.floor(i/9) >= startRow && Math.floor(i/9) <= startRow + 2 && i % 9 >= startColumn && i % 9 <= startColumn + 2) {
								squarePlacements[i] = this.getPlacements(grid, i);
							}
							gridPlacements.push(this.getPlacements(grid, i));
						} else {
							gridPlacements.push([]);
							rowPlacements[i] = [];
							columnPlacements[i] = [];
							squarePlacements[i] = [];
						}
					}
					
					let countRowPlacements = 0;
					let countColumnPlacements = 0;
					let countSquarePlacements = 0;
					for (let rowCell in rowPlacements) {
						if (rowPlacements[rowCell].includes(value)) {
							if (rowPlacements[rowCell].length === 1) {
								return 1;
							}
							let ruleOut = this.ruleOutViaCrossData(gridPlacements, rowCell, value);
							if (ruleOut) {
								continue;
							} else {
								countRowPlacements++;
							}
						}
					}
					for (let columnCell in columnPlacements) {
						if (columnPlacements[columnCell].includes(value)) {
							if (columnPlacements[columnCell].length === 1) {
								return 1;
							}
							let ruleOut = this.ruleOutViaCrossData(gridPlacements, columnCell, value);
							if (ruleOut) {
								continue;
							} else {
								countColumnPlacements++;
							}
						}
					}
					for (let squareCell in squarePlacements) {
						if (squarePlacements[squareCell].includes(value)) {
							if (squarePlacements[squareCell].length === 1) {
								return 1;
							}
							let ruleOut = this.ruleOutViaCrossData(gridPlacements, squareCell, value);
							if (ruleOut) {
								continue;
							} else {
								countSquarePlacements++;
							}
						}
					}
					
					if (countRowPlacements === 1 || countColumnPlacements === 1 || countSquarePlacements === 1) {
						return 1;
					} else {
						return 2;
					}
				}
				
				removeValues(toRemove) {
				
					let indexList = Array.from({length: 81}, (_, i) => i).sort(() => Math.random() - 0.5);
					indexList.sort(() => Math.random() - 0.5);
					let removed = 0;
					
					for (let index of indexList) {
						if (removed >= toRemove) {
							break;
						}
						
						let value = this.grid[index];
						this.grid[index] = 0;
						
						if (this.countSolutions(this.grid, index, value) !== 1) {
							this.grid[index] = value;
						} else {
							removed++;
						}
					}
					console.log('removed ' + removed + ' values.');
				}
				
				updateTime() {
					const now = Date.now() - this.startTime;
					const date = new Date(now);
					const minutes = date.getMinutes();
					let seconds = '0' + date.getSeconds();
					seconds = seconds.slice(-2);
					$('p.time').text(minutes + ':' + seconds);
				}
				
				setDifficultyDisplay() {
					$('p.game-difficulty').text((this.difficulty.charAt(0).toUpperCase() + this.difficulty.slice(1)));
				}
				
				activateButtons() {
					let cells = this.cells;
					$('.number-button').on('click', function() {
						for (let i = 0; i < cells.length; i++) {
							let cell = cells[i];
							if (cells[i].selected === 'true' && cells[i].type === 'user') {
								if ($('#note-toggle').attr('mode') === 'disabled') {
									cell.playerFill(parseInt($(this).attr('number')));
									break;
								} else {
									cell.note(parseInt($(this).attr('number')));
									break;
								}
								
							}
						}
					});
				}
				
				create(grid) {
					this.element.empty();
					for (let i = 1; i <= 9; i++) {
						this.element.append($(`<div class="square" number="${i}"></div>`));
					}
					
					let columnNumber = 0;
					let rowNumber = 1;
					let squareNumber = 1;
					for (let i = 1; i <= 81; i++) {
						if (columnNumber === 9) {
							columnNumber = 1;
							if (rowNumber === 3 || rowNumber === 6) {
								squareNumber++;
							} else {
								squareNumber = squareNumber - 2;
							}
							rowNumber++;
						} else {
							if (columnNumber === 3 || columnNumber === 6) {
								squareNumber++;
							}
							columnNumber++;
						}
						let newCell = new Cell(this, grid[i-1], i);
						this.cells.push(newCell);
						this.element.children(`.square[number="${squareNumber}"]`).append(newCell.element);
						newCell.initialize();
					}
					this.activateButtons();
					this.autoGrid = this.grid;
					this.startTime = Date.now();
					this.setDifficultyDisplay();
				}
				
				saveMove(cellId, moveType, prevVal, newVal) {
					let values = {
						cellId: cellId,
						moveType: moveType,
						prevVal: prevVal,
						newVal: newVal
					};
					this.moves.push(values);
				}
				
				undo() {
					this.undoFlag = true;
					let lastMove = this.moves[this.moves.length-1];
					if (lastMove === undefined) {
						this.undoFlag = false;
						return;
					}
					if (lastMove.moveType === 'note') {
						if (lastMove.prevVal === 0) {
							this.cells[lastMove.cellId].removeNote(lastMove.newVal);
						} else {
							this.cells[lastMove.cellId].note(lastMove.prevVal);
						}
					} else {
						if (lastMove.prevVal === 0) {
							this.cells[lastMove.cellId].empty();
						} else {
							this.cells[lastMove.cellId].playerFill(lastMove.prevVal);
						}
					}
					this.moves.splice(this.moves.length-1, 1);
					
					for (let i = 0; i < this.cells.length; i++) {
						this.cells[i].deselect();
					}
				}
